<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profiles</title>
    <style>
        .player-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
        }
        .player-card h3 { margin: 0; }
    </style>
</head>
<body>
    <h1>Westlake Player Profiles</h1>
    <div id="players"></div>

    <script>
        // Replace with your published Google Sheet CSV URL
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIEzgNvuHq-36u3nrpq2-DxBp32vRS3g0LLIr73WbpSKFiBu5xd01e-GUMQIOlECASOOyWBojdjuDT/pub?gid=0&single=true&output=csv';

        fetch(sheetUrl)
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // Skip header
                const playersDiv = document.getElementById('players');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 3) { // Assuming Name, Position, Stats
                        const card = document.createElement('div');
                        card.className = 'player-card';
                        card.innerHTML = `
                            <h3>${cols[0]}</h3>
                            <h5>${cols[1]}</h5>
                            <p>Position: ${cols[2]}</p>
                            <p>Offers: ${cols[3]}</p>
                            <p>Highlights: ${cols[5]}</p>
                            <p>${cols[6]}</p>
                        `;
                        playersDiv.appendChild(card);
                    }
                });
            })
            .catch(error => console.error('Error fetching sheet:', error));
    </script>
</body>
</html>
