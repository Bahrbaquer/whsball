<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profiles</title>
    <style>
        .player-card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
        }
        .player-card h3 { margin: 0; }
    </style>
</head>
<body>
    <h1>Westlake Player Profiles</h1>
    <div id="players"></div>

    <script>
        // Replace with your Google Sheet's export CSV URL
        // Get the spreadsheet ID from the edit URL (e.g., https://docs.google.com/spreadsheets/d/YOUR_ID/edit)
        // Then use: https://docs.google.com/spreadsheets/d/YOUR_ID/export?format=csv&gid=0
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1RwtkcGSaMuyU9qNgUYW9XqnUH7NShWy5NsekvXO2WHQ/export?format=csv&gid=0';

        fetch(sheetUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(data => {
                console.log('Fetched data:', data); // Debug: log the raw data
                const rows = data.split('\n').slice(1); // Skip header
                const playersDiv = document.getElementById('players');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length >= 3) { // Assuming Name, Position, Stats
                        const card = document.createElement('div');
                        card.className = 'player-card';
                        card.innerHTML = `
                            <h3>${cols[0]}</h3>
                            <h5>${cols[1]}</h5>
                            <p>Position: ${cols[2]}</p>
                            <p>Offers: ${cols[3]}</p>
                            <p>Highlights: ${cols[5]}</p>
                            <p>${cols[6]}</p>
                        `;
                        playersDiv.appendChild(card);
                    }
                });
            })
            .catch(error => console.error('Error fetching sheet:', error));
    </script>
</body>
</html>
